name: Release

# Triggered by scripts/release.sh pushing a v* tag:
#   build (Release, Developer ID signed) → notarize + staple → zip →
#   generate signed Sparkle appcast → publish zip + appcast.xml to this repo's
#   GitHub release.
#
# Required repository secrets:
#   MACOS_CERTIFICATE       base64 of the Developer ID Application .p12
#   MACOS_CERTIFICATE_PWD   the .p12 export password
#   MACOS_CERTIFICATE_NAME  the identity string, e.g.
#                           "Developer ID Application: Your Name (TEAMID)"
#   KEYCHAIN_PASSWORD       any throwaway password for the temp CI keychain
#   APPLE_ID                Apple ID email for notarytool
#   APPLE_APP_PASSWORD      app-specific password from appleid.apple.com
#   APPLE_TEAM_ID           Developer team ID
#   SPARKLE_PRIVATE_KEY     EdDSA private key for appcast signing; its public
#                           half is SUPublicEDKey in project.yml. Export it with
#                           <sparkle-bin>/generate_keys -x /dev/stdout
#
# Optional:
#   REVALIDATE_SECRET       shared secret for runbar.app's /api/revalidate, so
#                           the site's download link updates the moment a
#                           release publishes. Must match the REVALIDATE_SECRET
#                           environment variable set in the Vercel project.
#                           Omit it and the site falls back to its hourly
#                           revalidate; the release still succeeds either way.
#
# Releases publish to this repo, so the built-in GITHUB_TOKEN suffices — no
# cross-repo PAT. The app's SUFeedURL points at this repo's latest release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      RELEASES_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XCODE" ]; then
            XCODE="$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resolve version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      # Import the Developer ID Application certificate into a throwaway
      # keychain so codesign can sign with it non-interactively.
      - name: Set up signing keychain
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      # Hardened runtime is on (ENABLE_HARDENED_RUNTIME: YES in project.yml),
      # which notarization requires; --timestamp gets a secure timestamp.
      - name: Build
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodegen generate
          xcodebuild -project Runbar.xcodeproj -scheme Runbar \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CODESIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            build

      # Two notarization gotchas the plain build leaves behind: (1) xcodebuild
      # does not reliably give Sparkle's nested Mach-Os (Autoupdate, Updater.app,
      # the .xpc services) both a hardened runtime and a secure timestamp, and
      # (2) a Release `build` still injects the get-task-allow debug entitlement.
      # Re-sign Sparkle inside-out, then re-seal the app without that entitlement.
      - name: Re-sign for notarization
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          APP="build/DerivedData/Build/Products/Release/Runbar.app"
          FW="$APP/Contents/Frameworks/Sparkle.framework"

          if [ -d "$FW" ]; then
            for nested in \
              "$FW"/Versions/Current/XPCServices/*.xpc \
              "$FW"/Versions/Current/Updater.app \
              "$FW"/Versions/Current/Autoupdate; do
              [ -e "$nested" ] || continue
              codesign --force --sign "$CODESIGN_IDENTITY" \
                --options runtime --timestamp "$nested"
            done
            codesign --force --sign "$CODESIGN_IDENTITY" \
              --options runtime --timestamp "$FW"
          fi

          # Re-seal the app with its entitlements MINUS com.apple.security
          # .get-task-allow. `xcodebuild build -configuration Release` injects
          # that debug entitlement (it lets a debugger attach), and notarization
          # rejects any executable requesting it. Everything else is preserved;
          # an empty set is fine — the app is unsandboxed.
          ENT="$RUNNER_TEMP/app.entitlements"
          if ! codesign -d --entitlements - --xml "$APP" > "$ENT" 2>/dev/null || [ ! -s "$ENT" ]; then
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0"><dict/></plist>' > "$ENT"
          fi
          /usr/libexec/PlistBuddy -c "Delete :com.apple.security.get-task-allow" "$ENT" 2>/dev/null || true
          codesign --force --sign "$CODESIGN_IDENTITY" \
            --options runtime --timestamp --entitlements "$ENT" "$APP"

          # Fail here — before spending a notarization round-trip — if signing
          # is inconsistent.
          codesign --verify --deep --strict --verbose=2 "$APP"

      # Notarize and staple the .app BEFORE zipping. Order matters: zipping an
      # un-stapled app ships an unnotarized bundle inside a notarized zip.
      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="build/DerivedData/Build/Products/Release/Runbar.app"
          test -d "$APP"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"

          # Capture the submission so we can pull Apple's per-file reason log if
          # the result is Invalid — otherwise the failure is opaque ("Record not
          # found" on staple is only the downstream symptom of a rejected app).
          set +e
          OUT="$(xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)"
          CODE=$?
          set -e
          echo "$OUT"
          SUBMISSION_ID="$(printf '%s\n' "$OUT" | awk '/id:/{print $2; exit}')"

          if [ "$CODE" -ne 0 ] || printf '%s\n' "$OUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization did not succeed — dumping Apple's reason log"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" "$RUNNER_TEMP/notary-log.json" || true
              cat "$RUNNER_TEMP/notary-log.json" 2>/dev/null || true
            fi
            exit 1
          fi

          xcrun stapler staple "$APP"
          # Prove the shipped bundle is accepted by Gatekeeper as notarized.
          spctl -a -vvv -t install "$APP"
          xcrun stapler validate "$APP"

      - name: Package
        run: |
          APP="build/DerivedData/Build/Products/Release/Runbar.app"
          test -d "$APP"
          mkdir -p build/staging
          ditto -c -k --sequesterRsrc --keepParent "$APP" "build/staging/Runbar-$VERSION.zip"

      - name: Generate signed appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_BIN="$(find build/DerivedData/SourcePackages/artifacts -type d -name bin -path '*parkle*' | head -1)"
          test -n "$SPARKLE_BIN"
          echo "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/$RELEASES_REPO/releases/download/$TAG/" \
            --maximum-versions 1 \
            build/staging

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --repo "$RELEASES_REPO" \
            --title "Runbar $VERSION" \
            --generate-notes \
            "build/staging/Runbar-$VERSION.zip" \
            "build/staging/appcast.xml"

      # runbar.app reads the latest release from the GitHub API and caches it
      # for an hour (site/lib/release.ts), so without this the download button
      # keeps serving the *previous* zip for up to that long after a release.
      # Non-fatal by design: the release itself has already published, and the
      # hourly revalidate still catches up on its own.
      - name: Refresh site release cache
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -z "$REVALIDATE_SECRET" ]; then
            echo "::warning::REVALIDATE_SECRET is not set — skipping site refresh"
            exit 0
          fi
          curl -fsS --max-time 30 -X POST https://runbar.app/api/revalidate \
            -H "x-revalidate-secret: $REVALIDATE_SECRET" \
            || echo "::warning::Site revalidation failed; runbar.app will catch up within the hour"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
