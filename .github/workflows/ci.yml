name: CI

# The landing page in site/ is deployed by Vercel and shares none of this
# toolchain, so changes confined to it must not spin up a macOS runner.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'docs/**'
      - 'Design/**'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'site/**'
      - 'docs/**'
      - 'Design/**'
      - '**/*.md'
      - 'LICENSE'

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XCODE" ]; then
            XCODE="$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build and test
        run: |
          xcodebuild -project Runbar.xcodeproj -scheme Runbar \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=- \
            test
