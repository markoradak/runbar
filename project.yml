name: Runbar

options:
  bundleIdPrefix: app.runbar
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: 6.2.2
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    CLANG_ENABLE_MODULES: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 2
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: 0.1.1
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: "5.0"

targets:
  Runbar:
    type: application
    platform: macOS
    sources:
      - path: Sources/Runbar
    dependencies:
      - package: Yams
      - package: Sparkle
      - sdk: libsqlite3.tbd
    info:
      path: Sources/Runbar/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        LSUIElement: true
        SUEnableAutomaticChecks: true
        SUFeedURL: https://github.com/markoradak/runbar/releases/latest/download/appcast.xml
        SUPublicEDKey: 0Y/fgay6lWHRxqpxECSMG38IXYiVlolaDTAK9jXwgxM=
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: app.runbar.Runbar
        PRODUCT_NAME: Runbar

  RunbarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/RunbarTests
    dependencies:
      - target: Runbar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.runbar.RunbarTests

schemes:
  Runbar:
    build:
      targets:
        Runbar: all
        RunbarTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - RunbarTests
    run:
      config: Debug
